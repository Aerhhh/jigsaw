name: capture-baselines

# Manual dispatch ONLY. No push / pull_request triggers.
# The workflow never commits back to master and never opens an auto-PR - baselines
# land via a human-reviewed contributor PR. See CONTRIBUTING-BASELINES.md for the
# procedure.
on:
  workflow_dispatch:
    inputs:
      mc_version:
        description: "Minecraft version to baseline (default 26.1.2; Tessera 1.0.0 ships with the 26.1.2 AssetProvider)"
        required: false
        default: "26.1.2"

concurrency:
  # Serialise manual dispatches on the same ref so two contributors cannot race
  # each other to produce conflicting baseline zips. cancel-in-progress=false
  # because baseline captures are expensive (assets download + full fixture
  # render pass) and there is no value in killing a run mid-way through.
  group: capture-baselines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    name: capture baselines on JDK 21 LTS
    runs-on: ubuntu-latest
    # Single-JDK job: baselines anchor on JDK 21 LTS. The cross-JDK
    # drift check lives in build-test.yml (the 21+25 matrix), not here. Dispatching
    # this workflow twice on different JDKs is not a supported mode.
    permissions:
      # Read-only: the workflow uploads an artifact but NEVER pushes a commit or
      # opens a PR. If a future PR flips this to write, CODEOWNERS review on
      # .github/workflows/** is the backstop against accidental auto-commit drift.
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install reactor up to tessera-testkit
        # Installs sibling SNAPSHOT jars (tessera-api, tessera-spi, tessera-bom,
        # tessera-assets-26.1.2, tessera-core) into ~/.m2 so that later `mvn -pl
        # tessera-testkit ...` invocations (which run in fresh reactor contexts)
        # resolve the in-repo deps locally instead of hitting JitPack. `test-compile`
        # alone only produces target/classes per module; it does not publish jars,
        # so subsequent -pl calls without -am would 404 on JitPack.
        run: ./mvnw -B -ntp -pl tessera-testkit -am install -DskipTests

      - name: Hydrate ~/.tessera/assets/${{ github.event.inputs.mc_version }}
        # Why this approach and not the plan's original /tmp/Hydrate.java idea:
        #   1. TesseraAssets lives in net.aerh.tessera.api.assets (not
        #      net.aerh.tessera.assets as the plan guessed). An inline /tmp
        #      launcher with the wrong import would silently fail at runtime.
        #   2. Engine.builder().build() does NOT auto-fetch on cache-miss; it
        #      verifies and throws TesseraAssetsMissingException. So the plan's
        #      fallback "let BeforeAll engine.build() hydrate" is non-functional.
        # Solution: a dedicated CaptureBaselinesHydrator class under test-scope
        # in tessera-testkit that wraps TesseraAssets.fetch. Maven's exec-maven-
        # plugin resolves the plugin jar on-demand (no pom wiring needed) and
        # -Dexec.classpathScope=test picks up the test-compiled hydrator.
        run: |
          ./mvnw -B -ntp -pl tessera-testkit \
              org.codehaus.mojo:exec-maven-plugin:3.5.0:java \
              -Dexec.mainClass=net.aerh.tessera.testkit.cli.CaptureBaselinesHydrator \
              -Dexec.classpathScope=test \
              -Dexec.args="${{ github.event.inputs.mc_version }} --accept-eula"
        env:
          # Defence in depth: CaptureBaselinesHydrator passes --accept-eula to the
          # builder-flag overload, but TesseraAssets also honours the env var. Both
          # paths close so if --accept-eula is ever dropped from the arg list the
          # env still permits the download. Matches the three EULA-acceptance
          # channels documented on TesseraAssets.
          TESSERA_ACCEPT_MOJANG_EULA: "true"

      - name: Mark assets available for GoldenFixturesTest env-gate
        # GoldenFixturesTest is gated by @EnabledIfEnvironmentVariable("TESSERA_ASSETS_AVAILABLE=true").
        # Setting it AFTER the hydration step guarantees we only enable the test
        # class once the cache is actually populated - a failed hydrate will trip
        # the previous step and this one will not run.
        run: echo "TESSERA_ASSETS_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: Run GoldenFixturesTest with -Dtessera.golden.update=true
        # The update flag toggles GoldenImageAssertion.updateIfRequested into
        # regeneration mode, writing the freshly-rendered PNG under
        # tessera-testkit/src/test/resources/golden/<mcVer>/ as the new baseline.
        #
        # regenerateBaseline refuses to run when env CI=true. We DELIBERATELY do NOT
        # set CI=true here (unlike build-test.yml which sets CI=true to enforce the
        # guard across normal CI). Setting the flag WITHOUT CI=true is the whole
        # point of this workflow - captured baselines are a contributor-reviewed
        # output, not a silent overwrite of master.
        #
        # Do NOT add `continue-on-error: true` - if the render itself fails, the
        # diff artifacts still get picked up by the subsequent upload-artifact@v4
        # step's `if: always()` guard and the contributor can inspect what went
        # wrong before re-dispatching.
        run: |
          ./mvnw -B -ntp -pl tessera-testkit test \
              -Dtest=GoldenFixturesTest \
              -Dtessera.golden.update=true

      - name: Upload captured baselines as workflow artifact
        if: always()
        # `if: always()` so even a partial failure (e.g. 11 of 12 fixtures rendered,
        # 1 threw) still uploads whatever PNGs did land, making it easier to
        # triage what went wrong. The `if-no-files-found: warn` keeps the job
        # green-but-noisy if the entire capture bombed and no PNGs exist.
        uses: actions/upload-artifact@v4
        with:
          name: tessera-golden-baselines-${{ github.event.inputs.mc_version }}-${{ github.sha }}
          path: |
            tessera-testkit/src/test/resources/golden/${{ github.event.inputs.mc_version }}/**/*.png
            tessera-testkit/src/test/resources/golden/${{ github.event.inputs.mc_version }}/**/*.webp
            tessera-testkit/src/test/resources/golden/${{ github.event.inputs.mc_version }}/**/*.gif
          retention-days: 14
          if-no-files-found: warn

      - name: Upload surefire reports for SSIM log inspection
        if: always()
        # Separate artifact (not bundled with the baselines) because the SSIM
        # calibration pass only needs the surefire stdout (`SSIM for <id>: <value>`
        # lines from GoldenImageAssertion) and contributors reviewing visuals do
        # not need a reports tarball cluttering their download. Two-artifact
        # pattern also makes the retention policy obvious: if we ever bump the
        # baselines to 30 days we can leave the reports at 14 independently.
        uses: actions/upload-artifact@v4
        with:
          name: capture-surefire-reports-${{ github.event.inputs.mc_version }}-${{ github.sha }}
          path: |
            tessera-testkit/target/surefire-reports/**
          retention-days: 14
          if-no-files-found: warn
