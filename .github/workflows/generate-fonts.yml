name: Generate Minecraft Fonts

on:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft version (leave empty for latest)'
        required: false
        default: ''
        type: string
      target_branch:
        description: 'Branch to commit fonts to (leave empty for default branch)'
        required: false
        default: ''
        type: string
      create_pr:
        description: 'Create a pull request with changes'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch != '' && inputs.target_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minecraft-fontgen
        run: pip install git+https://github.com/SkyBlock-Simplified/minecraft-fontgen.git

      - name: Generate fonts
        run: |
          VERSION="${{ inputs.minecraft_version }}"
          VERSION="${VERSION:-latest}"
          python -m minecraft_fontgen --version "$VERSION" --output /tmp/minecraft-fonts --type opentype --silent

      - name: Copy fonts to modules
        run: |
          cp /tmp/minecraft-fonts/Minecraft-*.otf generator/src/main/resources/minecraft/assets/fonts/
          cp /tmp/minecraft-fonts/Minecraft-*.otf tessera-core/src/main/resources/minecraft/assets/fonts/

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain "*/src/main/resources/minecraft/assets/fonts/") ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true' && inputs.create_pr == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b automated/font-update
          git add generator/src/main/resources/minecraft/assets/fonts/
          git add tessera-core/src/main/resources/minecraft/assets/fonts/
          git commit -m "Update Minecraft fonts"
          git push -f origin automated/font-update

          VERSION="${{ inputs.minecraft_version }}"
          VERSION="${VERSION:-latest}"

          BASE="${{ inputs.target_branch }}"
          BASE="${BASE:-master}"
          gh pr create \
            --title "Update Minecraft fonts" \
            --body "Automated font generation for Minecraft version \`$VERSION\`." \
            --base "$BASE" || echo "PR already exists"

      - name: Commit Directly
        if: steps.changes.outputs.has_changes == 'true' && inputs.create_pr == false
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generator/src/main/resources/minecraft/assets/fonts/
          git add tessera-core/src/main/resources/minecraft/assets/fonts/
          git commit -m "Update Minecraft fonts"
          BRANCH="${{ inputs.target_branch }}"
          git push origin HEAD:${BRANCH:-$(git rev-parse --abbrev-ref HEAD)}

      - name: Upload Artifacts
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: minecraft-fonts
          path: /tmp/minecraft-fonts/
          retention-days: 7
