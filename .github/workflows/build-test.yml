name: build-test

on:
  push:
    branches:
      - master
      - 'feat/**'
    paths:
      - '**.java'
      - '**/pom.xml'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches:
      - master
    paths:
      - '**.java'
      - '**/pom.xml'
      - '.github/workflows/build-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Library artifacts target Java 21 LTS; the matrix also exercises the latest JDK
        # to catch Temurin patch-release drift in the Graphics2D text rasteriser. Running
        # both JDK versions surfaces rasteriser diffs before they are locked into per-render
        # SSIM thresholds.
        java: ['21', '25']
    name: build (JDK ${{ matrix.java }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build + test
        run: ./mvnw -B -ntp -Dstyle.color=always org.ec4j.maven:editorconfig-maven-plugin:check clean verify
        env:
          # Enforces GoldenImageAssertion.regenerateBaseline CI-refusal guard.
          # GoldenUpdateFlagTest.ci_env_refuses_update_even_with_flag verifies the behaviour.
          CI: 'true'

      - name: Upload golden diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs-jdk-${{ matrix.java }}
          path: |
            **/tessera-golden-diffs/
            **/target/surefire-reports/
          retention-days: 14
